name: publish

# Publish @isaacriehm/cairn-core + @isaacriehm/cairn to npm on every
# `vX.Y.Z` tag push. Bump the package versions, push the tag — npm
# release happens automatically.
#
# Required repo secret: `NPM_TOKEN` (npm automation token, scope-scoped
# to @isaacriehm).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Publish cairn-core
        run: pnpm publish --filter @isaacriehm/cairn-core --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cairn
        run: pnpm publish --filter @isaacriehm/cairn --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
