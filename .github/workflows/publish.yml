name: publish

# Triggered by every `vX.Y.Z` tag push. Three deliverables:
#   1. @isaacriehm/cairn-core → npm
#   2. @isaacriehm/cairn → npm
#   3. cairn-lens-X.Y.Z.vsix → GitHub Release (with auto-generated notes)
#
# Bump the package versions, push the tag — releases happen automatically.
#
# Required repo secret:
#   NPM_TOKEN  — npm granular-access token scoped to @isaacriehm.
#
# Uses the built-in GITHUB_TOKEN for GitHub Release creation; no extra
# secret required.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # required to create GitHub Releases
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version sync gate
        run: pnpm version:check

      - name: Build
        run: pnpm -r build

      - name: Publish cairn-core
        run: pnpm publish --filter @isaacriehm/cairn-core --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cairn
        run: pnpm publish --filter @isaacriehm/cairn --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-vsix:
    name: Build + release vsix
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core (prerequisite for lens bundle)
        run: pnpm -r build

      - name: Package vsix
        working-directory: packages/cairn-lens
        run: pnpm package

      - name: Locate vsix
        id: vsix
        working-directory: packages/cairn-lens
        run: echo "path=$(ls *.vsix | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cairn ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: packages/cairn-lens/${{ steps.vsix.outputs.path }}
          body: |
            Cairn ${{ github.ref_name }}.

            ## Installs

            - **Claude Code plugin** (recommended): `/plugin marketplace add isaacriehm/cairn` then `/plugin install cairn@isaacriehm-cairn`
            - **CLI**: `npm install -g @isaacriehm/cairn`
            - **Library**: `npm install @isaacriehm/cairn-core`
            - **Editor extension** (Cairn Lens): download the `.vsix` below
              and install via `Cmd/Ctrl+Shift+P` → `Extensions: Install from VSIX…`.
